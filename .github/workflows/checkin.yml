name: iamhc Daily Checkin

on:
  schedule:
    # 每天 UTC 01:00 运行（即北京时间次日 09:00）
    - cron: '0 01 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run checkin
        # EMAIL 支持两种格式（在仓库 Settings -> Secrets 里配置 EMAIL 即可）：
        #   单账号: a@a.com                       （同时需配置 PASSWORD secret）
        #   多账号: a@a.com----passwordA&b@b.com----passwordB
        #           （多账号模式下 PASSWORD secret 可以不填，会被忽略）
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python checkin.py

      - name: clear old run jobs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "deleted: $run_id"
              gh run delete $run_id || true
            fi
          done
